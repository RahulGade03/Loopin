<svg width="320" height="200" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradient -->
  <defs>
    <linearGradient id="loopGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4fa3"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4cc9f0"/>
    </linearGradient>
  </defs>

  <!-- Infinity Loop (fine-tuned thickness) -->
  <path
    d="
      M 95 100
      C 95 65, 140 65, 160 100
      C 180 135, 225 135, 225 100
      C 225 65, 180 65, 160 100
      C 140 135, 95 135, 95 100
    "
    fill="none"
    stroke="url(#loopGrad)"
    stroke-width="20"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Dots -->
  <circle cx="125" cy="48" r="13" fill="#ff4fa3"/>
  <circle cx="195" cy="48" r="13" fill="#4cc9f0"/>

</svg>